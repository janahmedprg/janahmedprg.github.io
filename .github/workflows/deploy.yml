name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secret
        env:
          REACT_APP_POL_API_KEY: ${{ secrets.REACT_APP_POL_API_KEY }}
          REACT_APP_LLM_CHAT_ENDPOINT: ${{ secrets.REACT_APP_LLM_CHAT_ENDPOINT }}
          REACT_APP_LLM_PROMPT_LIMIT: ${{ secrets.REACT_APP_LLM_PROMPT_LIMIT }}
        run: |
          if [ -z "$REACT_APP_POL_API_KEY" ]; then
            echo "REACT_APP_POL_API_KEY secret is missing."
            exit 1
          fi
          if [ -z "$REACT_APP_LLM_CHAT_ENDPOINT" ]; then
            echo "REACT_APP_LLM_CHAT_ENDPOINT secret is missing."
            exit 1
          fi
          if [ -z "$REACT_APP_LLM_PROMPT_LIMIT" ]; then
            echo "REACT_APP_LLM_PROMPT_LIMIT secret is missing."
            exit 1
          fi

      - name: Build
        env:
          REACT_APP_POL_API_KEY: ${{ secrets.REACT_APP_POL_API_KEY }}
          REACT_APP_LLM_CHAT_ENDPOINT: ${{ secrets.REACT_APP_LLM_CHAT_ENDPOINT }}
          REACT_APP_LLM_PROMPT_LIMIT: ${{ secrets.REACT_APP_LLM_PROMPT_LIMIT }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
